<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- Google verification -->
  <meta name="google-site-verification" content="wiAR13EDqgNYjONUni45oAX2LOi4yhGJH67u3Ub8Q58" />
  <!-- Viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- SEO -->
  <title>Node — The Thinking OS</title>
  <meta name="description" content="The Thinking OS" />
  <meta name="author" content="Node" />
  <link rel="canonical" href="https://trynode.in/" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- Open Graph (WhatsApp / LinkedIn / Facebook preview) -->
  <meta property="og:title" content="Node" />
  <meta property="og:description" content="The Thinking OS" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://trynode.in/" />
  <meta property="og:image" content="https://trynode.in/og-logo.png" />

  <!-- Twitter preview -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Node" />
  <meta name="twitter:description" content="The Thinking OS" />
  <meta name="twitter:image" content="https://trynode.in/og-logo.png" />

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    /* Initial App Splash Screen (Before React loads) */
    .initial-loader-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #ffffff;
      z-index: 9999;
    }

    @media (prefers-color-scheme: dark) {
      .initial-loader-wrapper {
        background-color: hsl(240, 10%, 4%);
      }
    }

    .initial-logo-container {
      position: relative;
      width: 140px;
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
    }

    .initial-loader-logo {
      width: 100%;
      height: auto;
      animation: breathe 3s ease-in-out infinite;
      filter: drop-shadow(0 0 12px hsla(263, 70%, 58%, 0.25));
    }

    @keyframes breathe {

      0%,
      100% {
        opacity: 0.85;
        transform: scale(0.98);
        filter: drop-shadow(0 0 8px hsla(263, 70%, 58%, 0.15));
      }

      50% {
        opacity: 1;
        transform: scale(1.02);
        filter: drop-shadow(0 0 16px hsla(263, 70%, 58%, 0.4));
      }
    }

    .initial-progress-track {
      width: 140px;
      height: 6px;
      background-color: hsl(252, 20%, 22%);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.5) inset;
    }

    .initial-progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background-color: hsl(263, 70%, 58%);
      box-shadow: 0 0 8px hsl(263, 70%, 58%);
      border-radius: 6px;
      animation: indeterminate 2s infinite ease-in-out;
    }

    @keyframes indeterminate {
      0% {
        left: -50%;
        width: 30%;
      }

      50% {
        width: 60%;
      }

      100% {
        left: 110%;
        width: 30%;
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="initial-loader-wrapper">
      <div class="initial-logo-container">
        <img src="/node-logo.svg" alt="Node Logo" class="initial-loader-logo">
      </div>
      <div class="initial-progress-track">
        <div class="initial-progress-bar"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Loader</title>
    <style>
        :root {
            --background: #ffffff;
            --foreground: hsl(240, 10%, 4%);
            --primary: hsl(263, 70%, 58%);
            --purple-400: hsl(263, 86%, 77%);
            --border: hsl(240, 6%, 90%);
            --glow-sm: 0 0 10px hsla(263, 70%, 58%, 0.15);
            --glow-purple: 0 0 20px hsla(263, 70%, 58%, 0.3);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --background: hsl(240, 10%, 4%);
                --foreground: hsl(214, 32%, 91%);
                --border: hsl(252, 20%, 22%);
            }
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--background);
            color: var(--foreground);
            font-family: 'Geist', 'IBM Plex Mono', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .loader-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px;
        }

        .logo-container {
            position: relative;
            width: 140px;
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
            z-index: 10;
        }

        .logo {
            width: 100%;
            height: auto;
            /* Subtle breathing effect on the logo */
            animation: breathe 3s ease-in-out infinite;
            filter: drop-shadow(0 0 12px hsla(263, 70%, 58%, 0.25));
        }

        @keyframes breathe {

            0%,
            100% {
                opacity: 0.85;
                transform: scale(0.98);
                filter: drop-shadow(0 0 8px hsla(263, 70%, 58%, 0.15));
            }

            50% {
                opacity: 1;
                transform: scale(1.02);
                filter: drop-shadow(0 0 16px hsla(263, 70%, 58%, 0.4));
            }
        }

        /* Sleek modern indeterminate progress bar */
        .progress-track {
            width: 140px;
            height: 6px;
            background-color: var(--border);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.5) inset;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background-color: var(--primary);
            box-shadow: 0 0 8px var(--primary);
            border-radius: 6px;
            animation: indeterminate 2s infinite ease-in-out;
        }

        @keyframes indeterminate {
            0% {
                left: -50%;
                width: 30%;
            }

            50% {
                width: 60%;
            }

            100% {
                left: 110%;
                width: 30%;
            }
        }
    </style>
</head>

<body>
    <div class="loader-wrapper">
        <div class="logo-container">
            <img src="public/node-logo.svg" alt="Node Logo" class="logo">
        </div>

        <div class="progress-track">
            <div class="progress-bar"></div>
        </div>
    </div>
</body>

</html>

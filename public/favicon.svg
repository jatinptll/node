<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9333ea" />
      <stop offset="100%" stop-color="#6b21a8" />
    </linearGradient>
  </defs>
  
  <!-- Rounded purple background -->
  <rect x="10" y="10" width="100" height="100" rx="28" fill="url(#bgGrad)" />
  
  <!-- Centered geometric diamond -->
  <g transform="translate(60, 60) rotate(45) translate(-60, -60)">
    <rect x="42" y="42" width="36" height="36" rx="8" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
